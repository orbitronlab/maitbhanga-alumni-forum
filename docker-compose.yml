version: '3.9'

services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: alumni_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: alumni_forum
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alumni_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alumni_network

  # ─────────────────────────────────────────────
  # Redis (for rate limiting / caching)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: alumni_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - alumni_network

  # ─────────────────────────────────────────────
  # Next.js Application
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alumni_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-alumni_password_change_me}@postgres:5432/alumni_forum?schema=public
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      BKASH_BASE_URL: ${BKASH_BASE_URL}
      BKASH_APP_KEY: ${BKASH_APP_KEY}
      BKASH_APP_SECRET: ${BKASH_APP_SECRET}
      BKASH_USERNAME: ${BKASH_USERNAME}
      BKASH_PASSWORD: ${BKASH_PASSWORD}
      BKASH_CALLBACK_URL: ${BKASH_CALLBACK_URL}
      NAGAD_BASE_URL: ${NAGAD_BASE_URL}
      NAGAD_MERCHANT_ID: ${NAGAD_MERCHANT_ID}
      NAGAD_MERCHANT_PRIVATE_KEY: ${NAGAD_MERCHANT_PRIVATE_KEY}
      NAGAD_PUBLIC_KEY: ${NAGAD_PUBLIC_KEY}
      SSLCOMMERZ_STORE_ID: ${SSLCOMMERZ_STORE_ID}
      SSLCOMMERZ_STORE_PASSWD: ${SSLCOMMERZ_STORE_PASSWD}
      SSLCOMMERZ_IS_LIVE: ${SSLCOMMERZ_IS_LIVE:-false}
      SSLCOMMERZ_SUCCESS_URL: ${SSLCOMMERZ_SUCCESS_URL}
      SSLCOMMERZ_FAIL_URL: ${SSLCOMMERZ_FAIL_URL}
      SSLCOMMERZ_CANCEL_URL: ${SSLCOMMERZ_CANCEL_URL}
      SSLCOMMERZ_IPN_URL: ${SSLCOMMERZ_IPN_URL}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - alumni_network

  # ─────────────────────────────────────────────
  # Nginx Reverse Proxy (optional)
  # ─────────────────────────────────────────────
  # nginx:
  #   image: nginx:alpine
  #   container_name: alumni_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - ./ssl:/etc/nginx/ssl
  #   depends_on:
  #     - app
  #   networks:
  #     - alumni_network

volumes:
  postgres_data:
  redis_data:

networks:
  alumni_network:
    driver: bridge
